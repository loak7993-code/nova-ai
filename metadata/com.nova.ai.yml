AutoName: Nova AI

Summary: Privacy-focused AI chat client with tool calling and web search

Description: |
    Nova AI is a privacy-focused Android AI chat client that supports multiple
    LLM models via OpenAI-compatible APIs, with OpenCode Zen free models
    pre-configured out of the box.

    Features:
    * Multi-model support: Big Pickle, DeepSeek V4, MiMo V2.5, Nemotron 3 Ultra, North Mini Code, GLM 5.2, MiniMax M3, Kimi K2.7 Code
    * Free models work without an API key (OpenCode Zen)
    * Streaming responses with collapsible reasoning/thinking display
    * Tool calling: calculator, current time, and web search (SearXNG)
    * Image vision support (Big Pickle, MiniMax M3, Kimi K2.7 Code)
    * Markdown rendering with tables, code blocks, lists, and headings
    * Conversation management with chat history persistence
    * Self-hosted SearXNG web search (no API key required)
    * No tracking, no telemetry, no ads, no proprietary SDKs

    Free models from OpenCode Zen work with no API key. Paid models require
    a key from opencode.ai/zen. Web search requires a SearXNG instance URL.

